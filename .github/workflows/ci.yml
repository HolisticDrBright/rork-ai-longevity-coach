name: CI

on:
  push:
    branches: [main, "claude/**", "phase*"]
  pull_request:

jobs:
  backend-checks:
    name: Backend typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Reproducible install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Backend-scoped typecheck (mobile app has known pre-existing errors, tracked separately)
        run: npx tsc --noEmit -p tsconfig.backend.json
      - name: Unit + contract tests
        run: npx vitest run

  docker-build:
    name: Production image builds (frozen lockfile, pinned Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the Railway image
        run: docker build -f Dockerfile .

  db-tests:
    name: Migration/RLS suites vs staging project (gated on secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: gate
        env:
          HAS: ${{ secrets.STAGING_DB_URL != '' }}
        run: echo "run=$HAS" >> "$GITHUB_OUTPUT"
      - if: steps.gate.outputs.run == 'true'
        name: Run rolled-back SQL suites (from the desktop repo checkout)
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: |
          echo "Configure this job to check out AI_DESKTOP_PRO and run supabase/tests/*.sql via psql \$STAGING_DB_URL."
          echo "Left as a documented stub until a staging database secret exists."
      - if: steps.gate.outputs.run != 'true'
        run: echo "STAGING_DB_URL not configured — DB suites run via MCP during development; job skipped."
