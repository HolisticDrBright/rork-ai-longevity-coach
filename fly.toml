# fly.toml app configuration file generated for rork-ai-longevity-coach on 2026-04-29T16:58:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rork-ai-longevity-coach'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    port = 3000
    type = 'http'
    interval = '30s'
    timeout = '5s'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
